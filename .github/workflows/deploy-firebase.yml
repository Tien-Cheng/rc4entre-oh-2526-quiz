name: Deploy to Firebase

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: rc4entre-2026-openhouse
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Service Account)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RC4ENTRE_2026_OPENHOUSE }}'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install functions dependencies
        run: pnpm --dir functions install --frozen-lockfile

      - name: Type and lint check
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test:unit

      - name: Run functions tests
        run: pnpm run functions:test

      - name: Build web app
        run: pnpm run build

      - name: Build functions
        run: pnpm run functions:build

      - name: Deploy Firestore rules and indexes
        run: npx firebase-tools deploy --non-interactive --project "$FIREBASE_PROJECT_ID" --only firestore:rules,firestore:indexes

      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --non-interactive --project "$FIREBASE_PROJECT_ID" --only functions --force

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --non-interactive --project "$FIREBASE_PROJECT_ID" --only hosting
