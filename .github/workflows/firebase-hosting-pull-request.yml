# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  contents: read
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: rc4entre-2026-openhouse
      FIREBASE_PREVIEW_CHANNEL: pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RC4ENTRE_2026_OPENHOUSE }}'

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile && pnpm build

      - run: npx firebase-tools hosting:channel:deploy "$FIREBASE_PREVIEW_CHANNEL" --project "$FIREBASE_PROJECT_ID" --expires 7d --non-interactive
